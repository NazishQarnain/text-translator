<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Language Translator</h2>

  <div class="box">
    <textarea class="from-text" placeholder="Type text here"></textarea>

    <div class="controls">
      <select class="from-lang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="ur">Urdu</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <!-- aur bhi languages add kar sakte ho -->
      </select>

      <button class="swap">⇄</button>

      <select class="to-lang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="ur">Urdu</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <button class="translate-btn">Translate</button>

    <textarea class="to-text" placeholder="Translation" readonly></textarea>
  </div>

  <script src="script.js"></script>
</body>
</html>
