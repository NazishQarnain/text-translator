<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Language Translator</h2>

    <div class="box">
      <label for="from-text">Input text</label>
      <textarea id="from-text" class="from-text" placeholder="Type or paste text here"></textarea>

      <div class="controls">
        <div class="select-group">
          <span>From:</span>
          <select class="from-lang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
          </select>
        </div>

        <button class="swap" title="Swap languages">⇄</button>

        <div class="select-group">
          <span>To:</span>
          <select class="to-lang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
          </select>
        </div>
      </div>

      <button class="translate-btn">Translate</button>

      <label for="to-text">Translation</label>
      <textarea id="to-text" class="to-text" placeholder="Translation will appear here" readonly></textarea>
    </div>

    <p class="note">
      This tool uses a free API and automatically splits long text into smaller parts for translation. Very long or heavy use may sometimes fail.
    </p>
  </div>

  <!-- Sirf hamara script (no Puter) -->
  <script src="script.js"></script>
</body>
</html>
